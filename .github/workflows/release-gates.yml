name: Release Gates

on:
  pull_request:
  push:
    branches:
      - gRPC
      - main
  workflow_dispatch:
    inputs:
      run_ai_image:
        description: Build and scan the opt-in AI image
        required: false
        default: "false"
  release:
    types: [created]

jobs:
  architecture-and-config-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Contract tests
        run: env UV_CACHE_DIR=/tmp/uv-cache uv run --group dev pytest -q tests/contract
      - name: Docker Compose config
        run: docker compose config --quiet
      - name: Kustomize render
        run: kubectl kustomize deploy/kubernetes/base
      - name: Generated proto drift
        run: |
          env UV_CACHE_DIR=/tmp/uv-cache uv run python scripts/gen_protos.py
          git diff --exit-code -- Services proto scripts/gen_protos.py
      - name: Production cutover dry-run
        run: python3 scripts/cutover_rehearsal.py --manifest deploy/kubernetes/examples/production-cutover-manifest.example.json --dry-run

  gateway-stack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Gateway contract and E2E smoke
        run: tests/e2e/run_gateway_stack_tests.sh

  release-candidate-build-scan:
    runs-on: ubuntu-latest
    needs:
      - architecture-and-config-gates
      - gateway-stack-smoke
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_SHA::12}" >> "$GITHUB_ENV"
      - name: Build non-AI runtime images
        run: docker compose build api-gateway identity-service customer-service product-service warehouse-service inventory-service documents-service audit-service reporting-service
      - name: Build opt-in AI image
        if: github.event.inputs.run_ai_image == 'true'
        run: docker compose --profile ai build ai-service
      - name: Generate release artifact
        run: python3 scripts/release_artifact.py --release-version "$RELEASE_VERSION" --output release-artifact.json
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: wms/api-gateway:dev
          format: spdx-json
          output-file: sbom-api-gateway.spdx.json
      - name: Vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: wms/api-gateway:dev
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wms-release-artifacts
          path: |
            release-artifact.json
            sbom-api-gateway.spdx.json
