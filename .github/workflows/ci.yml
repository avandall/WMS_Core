name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  UV_CACHE_DIR: /tmp/uv-cache
  PYTHON_VERSION: '3.12'

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Run ruff check (critical errors only)
        run: uv run ruff check --select=F9,F821,F822,F823 .

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///test.db"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Run contract tests
        env:
          TEST_DATABASE_URL: "sqlite:///test.db"
        run: uv run --group dev pytest -q tests/contract

  proto-drift-check:
    name: Proto Generation Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Generate protos
        run: uv run python scripts/gen_protos.py
      - name: Check for drift
        run: git diff --exit-code -- Services proto scripts/gen_protos.py

  docker-compose-config:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        run: docker compose config --quiet

  kubernetes-config:
    name: Kubernetes Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Validate kustomize manifests
        run: kubectl kustomize deploy/kubernetes/base

  security-governance:
    name: Security Governance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run security governance check
        run: python3 scripts/security_governance_check.py --policy deploy/kubernetes/examples/security-governance-policy.json

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs:
      - lint-and-format
      - contract-tests
      - proto-drift-check
      - docker-compose-config
      - kubernetes-config
      - security-governance
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Run E2E tests
        run: tests/e2e/run_gateway_stack_tests.sh

  build-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - lint-and-format
      - contract-tests
      - proto-drift-check
      - docker-compose-config
      - kubernetes-config
      - security-governance
      - e2e-tests
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Lint and Format: ${{ needs.lint-and-format.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Contract Tests: ${{ needs.contract-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Proto Drift Check: ${{ needs.proto-drift-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Compose Config: ${{ needs.docker-compose-config.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Kubernetes Config: ${{ needs.kubernetes-config.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Governance: ${{ needs.security-governance.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
