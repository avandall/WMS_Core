name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r Services/wms-monolith/requirements.txt
      - name: Run unit tests
        env:
          DATABASE_URL: 'sqlite:///:memory:'
        run: |
          pytest -q Services/wms-monolith/tests/unit

  refactor-guard-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r Services/wms-monolith/requirements.txt
      - name: Run refactor guard tests
        run: |
          cd Services/wms-monolith
          chmod +x tests/refactor_guard/run_refactor_guard.sh
          ./tests/refactor_guard/run_refactor_guard.sh

  gateway-stack-contract-e2e-tests:
    needs: refactor-guard-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install gateway test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest httpx
      - name: Run API Gateway contract and E2E tests against root gRPC stack
        run: tests/e2e/run_gateway_stack_tests.sh
