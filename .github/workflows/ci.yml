name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gateway-stack-contract-e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Run API Gateway contract and E2E tests against root gRPC stack
        run: tests/e2e/run_gateway_stack_tests.sh
