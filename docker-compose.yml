name: wms-monorepo

services:
  api-gateway:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./Services/api-gateway:/workspace
    command: ["bash", "-lc", "python -V && echo 'TODO: add Dockerfile / deps install' && sleep infinity"]
    ports:
      - "8000:8000"

  identity-service:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./Services/identity-service:/workspace
    command: ["bash", "-lc", "python -V && echo 'TODO: add Dockerfile / deps install' && sleep infinity"]
    ports:
      - "8001:8001"
      - "50051:50051"
    environment:
