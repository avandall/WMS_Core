name: wms-monorepo

x-service-env: &service-env
  PYTHONUNBUFFERED: "1"
  IDENTITY_GRPC_ADDR: identity-service:50051
  SECRET_KEY: ${SECRET_KEY:-wms-local-dev-secret}
  EVENT_BUS_URL: redis://event-bus:6379/0
  EVENT_STREAM: wms.events
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_TRACES_EXPORTER: otlp
  GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-0}
  GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-}
  GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-}
  GRPC_TLS_CLIENT_CA_FILE: ${GRPC_TLS_CLIENT_CA_FILE:-}
  GRPC_CLIENT_TLS_ENABLED: ${GRPC_CLIENT_TLS_ENABLED:-0}
  GRPC_CLIENT_ROOT_CERT_FILE: ${GRPC_CLIENT_ROOT_CERT_FILE:-}
  GRPC_CLIENT_CERT_FILE: ${GRPC_CLIENT_CERT_FILE:-}
  GRPC_CLIENT_KEY_FILE: ${GRPC_CLIENT_KEY_FILE:-}

x-grpc-healthcheck: &grpc-healthcheck
  interval: 10s
  timeout: 3s
  retries: 12
  start_period: 20s

services:
  event-bus:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s

  api-gateway:
    image: wms/api-gateway:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: api-gateway
    command: ["api-gateway"]
    ports:
      - "8000:8000"
    environment:
      <<: *service-env
      CUSTOMER_GRPC_ADDR: customer-service:50052
      PRODUCT_GRPC_ADDR: product-service:50053
      WAREHOUSE_GRPC_ADDR: warehouse-service:50054
      INVENTORY_GRPC_ADDR: inventory-service:50055
      DOCUMENTS_GRPC_ADDR: documents-service:50056
      AUDIT_GRPC_ADDR: audit-service:50057
      REPORTING_GRPC_ADDR: reporting-service:50058
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-0}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-1048576}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-10}
      # ai-service is intentionally opt-in because its ML dependency image is heavy.
      # Enable it with: docker compose --profile ai up -d
      AI_GRPC_ADDR: ai-service:50059
    depends_on:
      event-bus:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      warehouse-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      documents-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      reporting-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "http", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  identity-service:
    image: wms/identity-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: identity-service
    command: ["identity-grpc"]
    ports:
      - "50051:50051"
    environment:
      <<: *service-env
      DATABASE_URL: sqlite:////tmp/wms-identity.db
      INIT_DB_TABLES: users
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50051"]

  customer-service:
    image: wms/customer-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: customer-service
    command: ["customer-grpc"]
    ports:
      - "50052:50052"
    environment:
      <<: *service-env
      DATABASE_URL: sqlite:////tmp/wms-customer.db
      INIT_DB_TABLES: customers
    depends_on:
      event-bus:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50052"]

  product-service:
    image: wms/product-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: product-service
    command: ["product-grpc"]
    ports:
      - "50053:50053"
    environment:
      <<: *service-env
      DATABASE_URL: sqlite:////tmp/wms-product.db
      INIT_DB_TABLES: products,inventory
    depends_on:
      event-bus:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50053"]

  warehouse-service:
    image: wms/warehouse-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: warehouse-service
    command: ["warehouse-grpc"]
    ports:
      - "50054:50054"
    environment:
      <<: *service-env
      DATABASE_URL: sqlite:////tmp/wms-warehouse.db
      INIT_DB_TABLES: products,warehouses,warehouse_inventory,positions,inventory,position_inventory
    depends_on:
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50054"]

  inventory-service:
    image: wms/inventory-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: inventory-service
    command: ["inventory-grpc"]
    ports:
      - "50055:50055"
    environment:
      <<: *service-env
      DATABASE_URL: sqlite:////tmp/wms-inventory.db
      INIT_DB_TABLES: products,warehouses,inventory,warehouse_inventory
    depends_on:
      event-bus:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50055"]

  documents-service:
    image: wms/documents-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: documents-service
    command: ["documents-grpc"]
    ports:
      - "50056:50056"
    environment:
      <<: *service-env
      DATABASE_URL: sqlite:////tmp/wms-documents.db
      INIT_DB_TABLES: products,customers,warehouses,documents,document_items
    depends_on:
      event-bus:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50056"]

  audit-service:
    image: wms/audit-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: audit-service
    command: ["audit-grpc"]
    ports:
      - "50057:50057"
    environment:
      <<: *service-env
      DATABASE_URL: sqlite:////tmp/wms-audit.db
      INIT_DB_TABLES: audit_events
      AUDIT_EVENT_CONSUMER_ENABLED: "1"
    depends_on:
      event-bus:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50057"]

  reporting-service:
    image: wms/reporting-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: reporting-service
    command: ["reporting-grpc"]
    ports:
      - "50058:50058"
    environment:
      <<: *service-env
      DATABASE_URL: sqlite:////tmp/wms-reporting.db
      INIT_DB_TABLES: products,customers,warehouses,inventory,warehouse_inventory,documents,document_items,customer_purchases
    depends_on:
      event-bus:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50058"]

  ai-service:
    profiles: ["ai"]
    image: wms/ai-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: ai-service
    command: ["ai-grpc"]
    ports:
      - "50059:50059"
    environment:
      <<: *service-env
      DB_CONNECTION_STRING: sqlite:////tmp/wms-ai.db
      VECTOR_DB_PATH: /tmp/wms-ai-vector-db
    depends_on:
      event-bus:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50059"]
