x-build-common: &build-common
  context: .
  dockerfile: Dockerfile

x-api-gateway-env: &api-gateway-env
  SECRET_KEY: replace-with-local-dev-secret
  PYTHONUNBUFFERED: "1"
  IDENTITY_GRPC_ADDR: identity-service:50051
  CUSTOMER_GRPC_ADDR: customer-service:50052
  PRODUCT_GRPC_ADDR: product-service:50053
  WAREHOUSE_GRPC_ADDR: warehouse-service:50054
  INVENTORY_GRPC_ADDR: inventory-service:50055
  DOCUMENTS_GRPC_ADDR: documents-service:50056
  AUDIT_GRPC_ADDR: audit-service:50057
  REPORTING_GRPC_ADDR: reporting-service:50058
  AI_GRPC_ADDR: ai-service:50059
  GRPC_TIMEOUT_FAST: "5"
  GRPC_TIMEOUT_DEFAULT: "10"
  GRPC_TIMEOUT_SLOW: "30"
  GRPC_TIMEOUT_AI: "60"
  GRPC_RETRY_ATTEMPTS: "2"
  GRPC_RETRY_BACKOFF_SECONDS: "0.05"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_RECOVERY_SECONDS: "15"
  GRPC_CLIENT_TLS_ENABLED: "0"
  GRPC_CLIENT_ROOT_CERT_FILE: ""
  GRPC_CLIENT_CERT_FILE: ""
  GRPC_CLIENT_KEY_FILE: ""
  CORS_ORIGINS: http://localhost:3000,http://localhost:8000,http://localhost:8080
  CORS_ALLOW_CREDENTIALS: "0"
  MAX_REQUEST_BODY_BYTES: "1048576"
  RATE_LIMIT_RPS: "10"
  EVENT_BUS_URL: redis://event-bus:6379/0
  EVENT_STREAM: wms.events
  EVENTS_ENABLED: "1"
  OTEL_TRACES_EXPORTER: otlp
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  LOG_FORMAT: json

x-service-env: &service-env
  PYTHONUNBUFFERED: "1"
  OTEL_TRACES_EXPORTER: otlp
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  LOG_FORMAT: json

services:
  api-gateway:
    image: wms/api-gateway:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: api-gateway
    env_file:
      - Services/api-gateway/.env.example
    environment:
      <<: *api-gateway-env
      PYTHONPATH: /app/Services/api-gateway/src:/app/Libraries/shared-utils/src
    command: ["api-gateway"]
    volumes:
      - ./Services/api-gateway/src:/app/Services/api-gateway/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
    ports:
      - "8000:8000"
    depends_on:
      - event-bus
      - otel-collector
      - identity-service
      - customer-service
      - product-service
      - warehouse-service
      - inventory-service
      - documents-service
      - audit-service
      - reporting-service

  dashboard:
    image: wms/api-gateway:dev
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
      DASHBOARD_GATEWAY_TIMEOUT: "65"
      DASHBOARD_DEV_JWT_SECRET: replace-with-local-dev-secret
      DASHBOARD_DEV_JWT_ALGORITHM: HS256
      PYTHONPATH: /app:/app/Libraries/shared-utils/src
    command: ["python", "-m", "uvicorn", "dashboard.app:app", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - ./dashboard:/app/dashboard:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
    ports:
      - "8080:8080"
    depends_on:
      - api-gateway

  identity-service:
    image: wms/identity-service:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: identity-service
    env_file:
      - Services/identity-service/.env.example
    environment:
      <<: *service-env
      PYTHONPATH: /app/Services/identity-service/src:/app/Libraries/shared-utils/src
      DATABASE_URL: sqlite:////data/wms-identity.db
    command: ["identity-grpc"]
    volumes:
      - ./Services/identity-service/src:/app/Services/identity-service/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
      - identity-data:/data
    depends_on:
      - otel-collector

  customer-service:
    image: wms/customer-service:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: customer-service
    env_file:
      - Services/customer-service/.env.example
    environment:
      <<: *service-env
      PYTHONPATH: /app/Services/customer-service/src:/app/Libraries/shared-utils/src
      DATABASE_URL: sqlite:////data/wms-customer.db
    command: ["customer-grpc"]
    volumes:
      - ./Services/customer-service/src:/app/Services/customer-service/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
      - customer-data:/data
    depends_on:
      - event-bus
      - otel-collector

  product-service:
    image: wms/product-service:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: product-service
    env_file:
      - Services/product-service/.env.example
    environment:
      <<: *service-env
      PYTHONPATH: /app/Services/product-service/src:/app/Libraries/shared-utils/src
      DATABASE_URL: sqlite:////data/wms-product.db
    command: ["product-grpc"]
    volumes:
      - ./Services/product-service/src:/app/Services/product-service/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
      - product-data:/data
    depends_on:
      - event-bus
      - otel-collector

  warehouse-service:
    image: wms/warehouse-service:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: warehouse-service
    env_file:
      - Services/warehouse-service/.env.example
    environment:
      <<: *service-env
      PYTHONPATH: /app/Services/warehouse-service/src:/app/Libraries/shared-utils/src
      DATABASE_URL: sqlite:////data/wms-warehouse.db
    command: ["warehouse-grpc"]
    volumes:
      - ./Services/warehouse-service/src:/app/Services/warehouse-service/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
      - warehouse-data:/data
    depends_on:
      - event-bus
      - otel-collector

  inventory-service:
    image: wms/inventory-service:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: inventory-service
    env_file:
      - Services/inventory-service/.env.example
    environment:
      <<: *service-env
      PYTHONPATH: /app/Services/inventory-service/src:/app/Libraries/shared-utils/src
      DATABASE_URL: sqlite:////data/wms-inventory.db
    command: ["inventory-grpc"]
    volumes:
      - ./Services/inventory-service/src:/app/Services/inventory-service/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
      - inventory-data:/data
    depends_on:
      - event-bus
      - otel-collector
      - warehouse-service

  documents-service:
    image: wms/documents-service:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: documents-service
    env_file:
      - Services/documents-service/.env.example
    environment:
      <<: *service-env
      PYTHONPATH: /app/Services/documents-service/src:/app/Libraries/shared-utils/src
      DATABASE_URL: sqlite:////data/wms-documents.db
    command: ["documents-grpc"]
    volumes:
      - ./Services/documents-service/src:/app/Services/documents-service/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
      - documents-data:/data
    depends_on:
      - event-bus
      - otel-collector

  audit-service:
    image: wms/audit-service:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: audit-service
    env_file:
      - Services/audit-service/.env.example
    environment:
      <<: *service-env
      PYTHONPATH: /app/Services/audit-service/src:/app/Libraries/shared-utils/src
      DATABASE_URL: sqlite:////data/wms-audit.db
    command: ["audit-grpc"]
    volumes:
      - ./Services/audit-service/src:/app/Services/audit-service/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
      - audit-data:/data
    depends_on:
      - event-bus
      - otel-collector

  reporting-service:
    image: wms/reporting-service:dev
    build:
      <<: *build-common
      args:
        UV_PACKAGE: reporting-service
    env_file:
      - Services/reporting-service/.env.example
    environment:
      <<: *service-env
      PYTHONPATH: /app/Services/reporting-service/src:/app/Libraries/shared-utils/src
      DATABASE_URL: sqlite:////data/wms-reporting.db
    command: ["reporting-grpc"]
    volumes:
      - ./Services/reporting-service/src:/app/Services/reporting-service/src:ro
      - ./Libraries/shared-utils/src:/app/Libraries/shared-utils/src:ro
      - reporting-data:/data
    depends_on:
      - event-bus
      - otel-collector

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
      - "4319:4317"

  event-bus:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel/otel-collector.yaml"]
    volumes:
      - ./deploy/otel-collector.local.yaml:/etc/otel/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  ai-service:
    image: wms/ai-service:dev
    profiles: ["ai"]
    build:
      <<: *build-common
      args:
        UV_PACKAGE: ai-service
    env_file:
      - Services/ai-service/.env
    environment:
      DB_CONNECTION_STRING: sqlite:////tmp/wms-ai.db
      VECTOR_DB_PATH: /tmp/wms-ai-vector-db
      AI_REINDEX_CONSUMER_ENABLED: "0"
      AI_REINDEX_QUEUE_PATH: /tmp/wms-ai-reindex-queue.jsonl
      AI_REINDEX_CONSUMER_GROUP: ai-service
      AI_REINDEX_CONSUMER_NAME: ai-service-1
      AI_REINDEX_DLQ_STREAM: wms.events.ai.dlq
      AI_REINDEX_CONSUMER_BLOCK_MS: "5000"
      AI_REINDEX_CONSUMER_BATCH_SIZE: "10"
      AI_REINDEX_CONSUMER_MAX_ATTEMPTS: "3"
      AI_REINDEX_CONSUMER_RECLAIM_IDLE_MS: "60000"
      AI_REINDEX_CONSUMER_START_ID: "0"
      FINE_TUNED_MODEL_PATH: training/fine_tuning/wms_final_adapter
      FINE_TUNED_MODEL_DEVICE: cuda
      FINE_TUNED_MAX_NEW_TOKENS: "256"
      AI_BACKEND_QUERY_URL: "http://api-gateway:8000/api/v1/ai/backend-query"
      AI_BACKEND_QUERY_TOKEN: ""
      AI_BACKEND_QUERY_TIMEOUT: "10"
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PYTHONPATH: /app/Services/ai-service/src:/app/Libraries/shared-utils/src
    command: ["ai-grpc"]
    volumes:
      - ./Services/ai-service/src:/app/Services/ai-service/src
      - ./Libraries/shared-utils/src/shared_utils:/app/shared_utils
      - ai-hf-cache:/root/.cache/huggingface
    depends_on:
      - event-bus
      - otel-collector

volumes:
  ai-hf-cache:
  identity-data:
  customer-data:
  product-data:
  warehouse-data:
  inventory-data:
  documents-data:
  audit-data:
  reporting-data:
