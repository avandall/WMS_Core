name: wms-monorepo

x-service-env: &service-env
  PYTHONUNBUFFERED: "1"
  IDENTITY_GRPC_ADDR: identity-service:50051
  DATABASE_URL: sqlite:////tmp/wms.db
  SECRET_KEY: wms-local-dev-secret

x-grpc-healthcheck: &grpc-healthcheck
  interval: 10s
  timeout: 3s
  retries: 12
  start_period: 20s

services:
  api-gateway:
    image: wms/api-gateway:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: api-gateway
    command: ["python", "-m", "api_gateway.main"]
    ports:
      - "8000:8000"
    environment:
      <<: *service-env
      CUSTOMER_GRPC_ADDR: customer-service:50052
      PRODUCT_GRPC_ADDR: product-service:50053
      WAREHOUSE_GRPC_ADDR: warehouse-service:50054
      INVENTORY_GRPC_ADDR: inventory-service:50055
      DOCUMENTS_GRPC_ADDR: documents-service:50056
      AUDIT_GRPC_ADDR: audit-service:50057
      REPORTING_GRPC_ADDR: reporting-service:50058
      AI_GRPC_ADDR: ai-service:50059
    depends_on:
      identity-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      warehouse-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      documents-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      reporting-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "http", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  identity-service:
    image: wms/identity-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: identity-service
    command: ["python", "/app/scripts/run_grpc_service.py", "identity_service"]
    ports:
      - "50051:50051"
    environment:
      <<: *service-env
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50051"]

  customer-service:
    image: wms/customer-service:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: customer-service
    command: ["python", "/app/scripts/run_grpc_service.py", "customer_service"]
    ports:
      - "50052:50052"
    environment:
      <<: *service-env
    depends_on:
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50052"]

  product-service:
