services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wms_password}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Remove the automatic SQL initialization - we'll handle it in the app
    ports:
      - "5433:5432"

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Ánh xạ toàn bộ thư mục gốc vào /app để đồng bộ pyproject.toml và src
      - .:/app  
    # Ghi đè lệnh chạy để dùng Uvicorn với tính năng --reload
    command: >
      sh -c "
        echo '🚀 Starting WMS API with Hot-Reload...'
        # Sử dụng uvicorn trực tiếp để tự động load lại khi bạn sửa code
        pip install -e . && \
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
  dashboard:
    image: nginx:alpine
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started # Hoặc service_healthy nếu bạn muốn đợi API sẵn sàng hoàn toàn

  # Development tools (only in development mode)
  dev-tools:
    image: adminer:latest
    ports:
      - "${ADMINER_PORT:-8090}:8080"
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
    # Only start in development mode
    profiles: ["dev"]

  # Cloudflare Tunnel (free / quick tunnel)
  # Enable with: docker compose --profile tunnel up -d
  tunnel:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate --url http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
