syntax = "proto3";
package wms_robot;

// 1. Dữ liệu Robot gửi lên
message PickupTask {

    string sku_id =1;

    int32 location =2;

}

message PickupRespone {

    bool is_complete =1;

    string reason =2;

    int32 complete_time =3;

}

message RobotLocation {

    string robot_id = 1;

    int32 xlocation =2;

    int32 ylocation =3;
}

message EmptyResponse {}
message RobotCommand {
    string action = 1; // Ví dụ: "STOP", "GO_LEFT", "SPEED_UP"
}

service RobotController {
    // Robot cập nhật vị trí, Server chỉ cần báo đã nhận (Ack)
    rpc UpdateLocationStream (stream RobotLocation) returns (EmptyResponse);

    // Bi-directional stream: Cả 2 cùng gửi và nhận liên tục (Bài mới)
    // Robot đổ tọa độ vào, Server đổ lệnh ra
    rpc ControlLoop (stream RobotLocation) returns (stream RobotCommand);
}