[tool:pytest]
# pytest configuration for WMS project
# This helps resolve I/O capture issues and improves test discovery

# Test discovery settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Python path settings
pythonpath = src

# Output capture settings (helps with I/O issues)
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    -v
    -s

# Disable capture completely to avoid I/O issues
capture = no

# Logging settings
log_cli = true
log_cli_level = INFO

# Timeout settings
timeout = 300

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    smoke: marks tests as smoke tests
    asyncio: marks tests as async tests

# Minimum version requirements
minversion = 6.0

# Filter warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::PytestUnknownMarkWarning

# AsyncIO configuration
asyncio_mode = auto
