syntax = "proto3";

package wms.audit.v1;

service AuditService {
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc GetEvent(GetEventRequest) returns (AuditEvent);
}

message AuditEvent {
  int64 id = 1;
  string request_id = 2;
  int64 user_id = 3;
  string action = 4;
  string entity_type = 5;
  string entity_id = 6;
  int64 warehouse_id = 7;
  string payload_json = 8;
  string created_at = 9;
}

message ListEventsRequest {
  string request_id = 1;
  int64 user_id = 2;
  string action = 3;
  string entity_type = 4;
  string entity_id = 5;
  int64 warehouse_id = 6;
  int64 limit = 7;
  int64 offset = 8;
}

message ListEventsResponse {
  repeated AuditEvent events = 1;
}

message GetEventRequest {
  int64 id = 1;
}

