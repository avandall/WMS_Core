name: wms-phase9

x-service-env: &service-env
  PYTHONUNBUFFERED: "1"
  IDENTITY_GRPC_ADDR: identity-service:50051
  DATABASE_URL: sqlite:////tmp/wms-phase9.db
  SECRET_KEY: wms-local-dev-secret
  RATE_LIMIT_RPS: "0"

x-grpc-healthcheck: &grpc-healthcheck
  interval: 10s
  timeout: 3s
  retries: 12
  start_period: 20s

services:
  api-gateway:
    image: wms/api-gateway:phase9
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: api-gateway
    command: ["api-gateway"]
    ports:
      - "8000:8000"
    environment:
      <<: *service-env
      CUSTOMER_GRPC_ADDR: customer-service:50052
    depends_on:
      identity-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "http", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  identity-service:
    image: wms/identity-service:phase9
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: identity-service
    command: ["identity-grpc"]
    environment:
      <<: *service-env
      INIT_DB_TABLES: users
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50051"]

  customer-service:
    image: wms/customer-service:phase9
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_PACKAGE: customer-service
    command: ["customer-grpc"]
    environment:
      <<: *service-env
      INIT_DB_TABLES: customers
    depends_on:
      identity-service:
        condition: service_healthy
    healthcheck:
      <<: *grpc-healthcheck
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50052"]
