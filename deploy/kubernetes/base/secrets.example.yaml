apiVersion: v1
kind: Secret
metadata:
  name: wms-secrets
  namespace: wms
type: Opaque
stringData:
  SECRET_KEY: replace-with-secret-manager-value
  IDENTITY_DATABASE_URL: replace-with-service-owned-database-url
  CUSTOMER_DATABASE_URL: replace-with-service-owned-database-url
  PRODUCT_DATABASE_URL: replace-with-service-owned-database-url
  WAREHOUSE_DATABASE_URL: replace-with-service-owned-database-url
  INVENTORY_DATABASE_URL: replace-with-service-owned-database-url
  DOCUMENTS_DATABASE_URL: replace-with-service-owned-database-url
  AUDIT_DATABASE_URL: replace-with-service-owned-database-url
  REPORTING_DATABASE_URL: replace-with-service-owned-database-url
---
apiVersion: v1
kind: Secret
metadata:
  name: wms-grpc-mtls
  namespace: wms
type: Opaque
stringData:
  tls.crt: replace-with-cert-manager-or-secret-manager-cert
  tls.key: replace-with-cert-manager-or-secret-manager-key
  ca.crt: replace-with-cert-manager-or-secret-manager-ca
