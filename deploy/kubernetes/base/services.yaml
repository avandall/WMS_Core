apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: wms
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: wms
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: wms
    spec:
      containers:
        - name: api-gateway
          image: wms/api-gateway:RELEASE_VERSION
          command: ["api-gateway"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: wms-runtime-config
            - secretRef:
                name: wms-secrets
          volumeMounts:
            - name: grpc-certs
              mountPath: /etc/wms/grpc
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: grpc-certs
          secret:
            secretName: wms-grpc-mtls
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: wms
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: wms
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/part-of: wms
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-service
        app.kubernetes.io/part-of: wms
    spec:
      containers:
        - name: identity-service
          image: wms/identity-service:RELEASE_VERSION
          command: ["identity-grpc"]
          ports:
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: wms-runtime-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wms-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wms-secrets
                  key: IDENTITY_DATABASE_URL
          volumeMounts:
            - name: grpc-certs
              mountPath: /etc/wms/grpc
              readOnly: true
          readinessProbe:
            exec:
              command: ["python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50051"]
          livenessProbe:
            exec:
              command: ["python", "/app/scripts/docker_healthcheck.py", "grpc", "localhost:50051"]
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: grpc-certs
          secret:
            secretName: wms-grpc-mtls
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: wms
spec:
  selector:
    app.kubernetes.io/name: identity-service
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
