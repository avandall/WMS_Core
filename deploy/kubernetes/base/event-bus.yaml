apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-bus
  namespace: wms
  labels:
    app.kubernetes.io/name: event-bus
    app.kubernetes.io/part-of: wms
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: event-bus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: event-bus
        app.kubernetes.io/part-of: wms
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: event-bus
  namespace: wms
spec:
  selector:
    app.kubernetes.io/name: event-bus
  ports:
    - name: redis
      port: 6379
      targetPort: redis
