apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wms-secrets
  namespace: wms
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-secret-store
    kind: ClusterSecretStore
  target:
    name: wms-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: wms/production/secret-key
    - secretKey: IDENTITY_DATABASE_URL
      remoteRef:
        key: wms/production/identity/database-url
    - secretKey: CUSTOMER_DATABASE_URL
      remoteRef:
        key: wms/production/customer/database-url
    - secretKey: PRODUCT_DATABASE_URL
      remoteRef:
        key: wms/production/product/database-url
    - secretKey: WAREHOUSE_DATABASE_URL
      remoteRef:
        key: wms/production/warehouse/database-url
    - secretKey: INVENTORY_DATABASE_URL
      remoteRef:
        key: wms/production/inventory/database-url
    - secretKey: DOCUMENTS_DATABASE_URL
      remoteRef:
        key: wms/production/documents/database-url
    - secretKey: AUDIT_DATABASE_URL
      remoteRef:
        key: wms/production/audit/database-url
    - secretKey: REPORTING_DATABASE_URL
      remoteRef:
        key: wms/production/reporting/database-url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wms-grpc-mtls
  namespace: wms
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-secret-store
    kind: ClusterSecretStore
  target:
    name: wms-grpc-mtls
    creationPolicy: Owner
  data:
    - secretKey: tls.crt
      remoteRef:
        key: wms/production/grpc/tls-crt
    - secretKey: tls.key
      remoteRef:
        key: wms/production/grpc/tls-key
    - secretKey: ca.crt
      remoteRef:
        key: wms/production/grpc/ca-crt
