apiVersion: batch/v1
kind: Job
metadata:
  name: identity-service-migration
  namespace: wms
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/component: migration
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: wms/identity-service:RELEASE_VERSION
          command: ["sh", "-c", "replace-with-identity-service-migration-command"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wms-secrets
                  key: IDENTITY_DATABASE_URL
---
