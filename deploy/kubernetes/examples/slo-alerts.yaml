apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: wms-slo-alerts
  namespace: wms
  labels:
    app.kubernetes.io/part-of: wms
spec:
  groups:
    - name: wms.gateway.slo
      rules:
        - alert: WmsGatewayHighErrorRate
          expr: sum(rate(http_requests_total{job="api-gateway",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="api-gateway"}[5m])) > 0.01
          for: 10m
          labels:
            severity: page
          annotations:
            summary: API Gateway 5xx rate is above the Phase 14 SLO budget.
        - alert: WmsGatewayHighLatency
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="api-gateway"}[5m])) by (le)) > 1
          for: 10m
          labels:
            severity: ticket
          annotations:
            summary: API Gateway p95 latency is above one second.
    - name: wms.events.slo
      rules:
        - alert: WmsEventStreamBacklog
          expr: redis_stream_length{stream="wms.events"} > 10000
          for: 15m
          labels:
            severity: ticket
          annotations:
            summary: Redis event stream backlog is above the configured audit retention window.
